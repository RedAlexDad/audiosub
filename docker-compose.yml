services:
  audiosub:
    build: .
    image: audiosub:latest
    container_name: audiosub
    network_mode: host
    volumes:
      - audiosub-cache:/home/audiosub/.cache
      - ./output:/app/output
    environment:
      - RUST_LOG=audiosub=info
    command: ["--help"]

  dev:
    build:
      context: .
      target: builder
    image: audiosub-dev:latest
    container_name: audiosub-dev
    network_mode: host
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
    working_dir: /app
    command: ["cargo", "watch", "-x", "run"]

volumes:
  audiosub-cache:
  cargo-cache:
